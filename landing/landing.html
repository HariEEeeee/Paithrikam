<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        
        .wood-overlay {
            background-image: linear-gradient(rgba(48, 31, 14, 0.4), rgba(48, 31, 14, 0.4));
            mix-blend-mode: multiply;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.02); }
        }

        .animate-splash {
            animation: fadeIn {
                0% { opacity: 0; transform: scale(1.05); }
                100% { opacity: 1; transform: scale(1); }
            }
            animation-duration: 3s;
            animation-fill-mode: forwards;
            animation-timing-function: cubic-bezier(0.2, 0, 0.2, 1);
        }

        @keyframes subtle-drift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .drift-bg {
            animation: subtle-drift 15s infinite alternate ease-in-out;
        }
    </style>

<body class="bg-background text-on-surface overflow-hidden">

<main class="relative h-screen w-screen flex items-center justify-center overflow-hidden">

                    Paithrikam
                </h1>
<div class="flex items-center justify-center gap-4">
<span class="h-[1px] w-8 bg-primary-fixed/30"></span>
<p class="font-label-caps text-label-caps text-primary-fixed tracking-[0.3em] uppercase italic opacity-70">
                        Heritage in every grain

<span class="h-[1px] w-8 bg-primary-fixed/30"></span>
</div>

<!-- Hidden Navigation Shell (Per Requirement - Contextually Suppressed for Splash) -->
<!-- The TopAppBar and BottomNavBar are omitted here as per the "Linear/Transactional/Splash" exclusion rule. -->
<script>
        // Simple entrance transition for text elements
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-splash > *');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    el.style.transition = 'all 1.2s cubic-bezier(0.2, 0, 0.2, 1)';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 400 + (index * 200));
            });
        });
    </script>
