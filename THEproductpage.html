<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paithrikam | Premium Teak Dining Chair</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- DESIGN SYSTEM & VARIABLES --- */
        :root {
            --bg-color: #FAF6F0;       /* Soft cream background from your screenshot */
            --text-dark: #2C1B11;      /* Deep wooden charcoal */
            --text-muted: #655345;     /* Warm earth muted text */
            --accent-pill: #EFEAE2;    /* Pill button background */
            --white: #FFFFFF;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding-bottom: 120px; /* Space so content doesn't hide behind floating navbar */
            overflow-x: hidden;
        }

        /* --- BLURRED HEADER (As seen in your design) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            background: rgba(250, 246, 240, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav-icon {
            font-size: 1.2rem;
            color: var(--text-dark);
            cursor: pointer;
            background: none;
            border: none;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            text-decoration: none;
        }

        /* --- MAIN PRODUCT CONTAINER --- */
        .product-container {
            max-width: 1200px;
            margin: 120px auto 40px auto;
            padding: 0 4%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        /* --- LEFT SIDE: IMAGE GALLERY --- */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-image-wrapper {
            width: 100%;
            border-radius: 32px; /* Matches the smooth rounded aesthetics */
            overflow: hidden;
            aspect-ratio: 4 / 5;
            background-color: #EFEAE2;
        }

        .main-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .thumbnail-row {
            display: flex;
            gap: 15px;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            background-color: #EFEAE2;
            transition: var(--transition);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail.active {
            border-color: var(--text-dark);
        }

        /* --- RIGHT SIDE: PRODUCT DETAILS --- */
        .product-details {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .tagline-spark {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .product-title {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .product-price {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .product-description {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* Feature Pills Layout */
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }

        .pill {
            background-color: var(--accent-pill);
            color: var(--text-dark);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Quantity and Action Buttons */
        .purchase-section {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            align-items: center;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid rgba(101, 83, 69, 0.3);
            border-radius: 100px;
            padding: 6px 12px;
            background: transparent;
        }

        .qty-btn {
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-dark);
        }

        .qty-number {
            width: 30px;
            text-align: center;
            font-weight: 500;
        }

        .add-to-cart-btn {
            flex-grow: 1;
            background-color: var(--text-dark);
            color: var(--bg-color);
            border: none;
            padding: 18px 32px;
            border-radius: 100px;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(44, 27, 17, 0.15);
        }

        .add-to-cart-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- FLOATING BOTTOM NAVIGATION BAR --- */
        .floating-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 30px;
            border-radius: 100px;
            display: flex;
            gap: 35px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(44, 27, 17, 0.08);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .floating-nav-item {
            color: var(--text-muted);
            font-size: 1.3rem;
            text-decoration: none;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .floating-nav-item:hover {
            color: var(--text-dark);
            background-color: rgba(44, 27, 17, 0.05);
        }

        .floating-nav-item.active {
            background-color: #2C1B11; /* Dark oval background for the active home icon */
            color: #FAF6F0;
        }

        /* --- RESPONSIVE BREAKPOINTS --- */
        @media (max-width: 900px) {
            .product-container {
                grid-template-columns: 1fr;
                gap: 40px;
                margin-top: 100px;
            }
            .product-title {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0 6%;
            }
            .floating-nav {
                width: 85%;
                justify-content: space-around;
                gap: 10px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <button class="nav-icon" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
        <a href="mainhome.html" class="logo">Paithrikam</a>
        <button class="nav-icon" aria-label="Cart"><i class="fa-solid fa-bag-shopping"></i></button>
    </header>

    <main class="product-container">
        
        <section class="product-gallery">
            <div class="main-image-wrapper">
                <img id="mainProductImage" src="https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?auto=format&fit=crop&q=80&w=800" alt="Paithrikam Premium Teak Chair Main View">
            </div>

        </section>

        <section class="product-details">
            <div class="tagline-spark">
                <i class="fa-solid fa-sparkles" style="font-size: 0.8rem;"></i>
                <span>Our Heritage, Your Legacy</span>
            </div>
            
            <h1 class="product-title" id="productTitle"></h1>

            <div class="product-price" id="productPrice"></div>

            <p class="product-description" id="productDescription"></p>

            <div class="pill-group">
                <span class="pill">Solid Teak</span>
                <span class="pill">Hand-Carved</span>
                <span class="pill">Sustainable</span>
            </div>

            <div class="purchase-section">
                <div class="quantity-selector">
                    <button class="qty-btn" id="decreaseQty" aria-label="Decrease quantity"><i class="fa-solid fa-minus"></i></button>
                    <span class="qty-number" id="qtyDisplay">1</span>
                    <button class="qty-btn" id="increaseQty" aria-label="Increase quantity"><i class="fa-solid fa-plus"></i></button>
                </div>

                <button class="add-to-cart-btn" onclick="addToCart()">Make This Yours</button>

            </div>
        </section>

    </main>

    <nav class="floating-nav">
        <a href="mainhome.html" class="floating-nav-item active" aria-label="Home"><i class="fa-solid fa-house"></i></a>
        <a href="product.html" class="floating-nav-item" aria-label="Categories"><i class="fa-solid fa-grid-2"></i><i class="fa-solid fa-border-all"></i></a>
        <a href="ourstory.html" class="floating-nav-item" aria-label="Favorites"><i class="fa-regular fa-heart"></i></a>
        <a href="custompage.html" class="floating-nav-item" aria-label="Features"><i class="fa-solid fa-wand-magic-sparkles"></i></a>
        <a href="index.html" class="floating-nav-item" aria-label="Profile"><i class="fa-regular fa-user"></i></a>
    </nav>

<script src="THEproductpage.js"></script>
</body>
</html>
