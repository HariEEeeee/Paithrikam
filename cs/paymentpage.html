<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS Stitchings – Cart</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Cormorant+Upright:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="paymentpage.css">
</head>

<body>

  <!-- NAVBAR -->
  <div id="navigation">
    <h1 id="Italianno">CS Stitchings</h1>
  </div>

  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Shop</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
  </nav>

  <!-- MAIN CART CONTAINER -->
  <div id="container">

    <!-- CART ITEMS (JS WILL INSERT PRODUCTS HERE) -->
    <div id="cart">
      <!-- JS will auto-generate product cards -->
    </div>

    <!-- PRICE SUMMARY -->
    <div id="price-summary">
        <div class="price-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
        </div>

        <div class="price-row">
            <span>Delivery</span>
            <span id="delivery">₹0</span>
        </div>

        <hr>

        <div class="price-row total">
            <span>Total</span>
            <span id="total">₹0</span>
        </div>

          <button id="checkout-btn">Proceed to Checkout</button>
    </div>

  <!-- JS -->
  <script src="paymentpage.js"></script>

</body>
</html>
