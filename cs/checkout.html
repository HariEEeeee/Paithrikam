<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | CS Stitchings</title>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .checkout-box {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 22px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 18px;
      font-size: 1.4rem;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 0.95rem;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .total {
      font-weight: bold;
      text-align: center;
      margin: 12px 0 16px;
      font-size: 1.05rem;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #222;
    }

    /* ===== Tablet & up ===== */
    @media (min-width: 600px) {
      .checkout-box {
        padding: 26px;
      }

      h2 {
        font-size: 1.5rem;
      }
    }

    /* ===== Laptop & up ===== */
    @media (min-width: 1024px) {
      body {
        padding: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="checkout-box">
    <h2>Checkout</h2>

    <input type="text" id="name" placeholder="Full Name" required />
    <input type="email" id="email" placeholder="Email Address" required />
    <input type="tel" id="phone" placeholder="Mobile Number" required />
    <input type="text" id="address" placeholder="Address" required />
    <input type="text" id="pincode" placeholder="Pincode" required />
    <textarea id="notes" placeholder="Notes / Instructions"></textarea>

    <div class="total" id="totalAmount">Total: ₹0</div>

    <button onclick="payNow()">Pay Now</button>
  </div>

  <script>
    // =======================
    // GET TOTAL FROM CART
    // =======================
    let totalAmount = Number(localStorage.getItem("checkoutTotal")) || 0;

    document.getElementById("totalAmount").innerText =
      "Total: ₹" + totalAmount;

    function payNow() {
      if (totalAmount === 0) {
        alert("Your cart is empty!");
        return;
      }

      let options = {
        key: "rzp_live_RyXIHVixHCYFlt",
        amount: totalAmount * 100,
        currency: "INR",
        name: "CS Stitchings",
        description: "Order Payment",

        handler: function (response) {
          alert(
            "✅ Payment Successful!\nPayment ID: " +
              response.razorpay_payment_id
          );

          localStorage.removeItem("cartProduct");
          localStorage.removeItem("checkoutTotal");
        },
        

        prefill: {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          contact: document.getElementById("phone").value
        },

        theme: {
          color: "#000000"
        }
      };

      let rzp = new Razorpay(options);
      rzp.open();
    }
  </script>
</body>
</html>
